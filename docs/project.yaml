project:
  name: api-nominas
  version: 0.0.1
  description: NestJS Boilerplate Service
  root_path: .
  status: active
commands:
  dev: npm run start:dev
  build: npm run build
  lint: npm run lint
  test: npm run test
  test_e2e: npm run test:e2e
  docs_check: null
stack:
  framework: NestJS
  language: TypeScript
  runtime: Node.js
  database: MongoDB
  packages:
  - '@common/ai'
  - '@common/auth'
  - '@common/common'
  - '@common/database'
  - '@common/documents'
  - '@common/http'
  - '@common/playwright'
  - '@common/resend'
  - '@common/serve-static'
architecture:
  layers:
  - name: Layer 0 — Infra
    packages:
    - common
  - name: Layer 1 — Data
    packages:
    - database
  - name: Layer 2 — Business
    packages:
    - auth
    - resend
  - name: Layer 3 — Integration
    packages:
    - ai
    - playwright
    - http
    - documents
    - serve-static
  dependencies_graph:
  - source: database
    target: common
  - source: auth
    target: database
  - source: apps/nominas
    target: auth
  - source: apps/nominas
    target: database
  - source: apps/nominas
    target: playwright
  - source: apps/nominas
    target: ai
  - source: apps/nominas
    target: documents
  - source: apps/nominas
    target: resend
  - source: apps/nominas
    target: serve-static
  - source: modules/usuarios
    target: database
  - source: modules/dynamic-schema
    target: ai
  - source: modules/dynamic-schema
    target: documents
  - source: resend
    target: resend-api
  - source: playwright
    target: chromium
  - source: ai
    target: llm-api
packages:
  ai:
    scope: '@common/ai'
    path: packages/ai
    readme: packages/ai/README.md
    index: packages/ai/src/index.ts
    status: partial
    missing:
    - jsdoc
    - tests
    depends_on: []
    env_vars:
    - OPENAI_API_KEY
    - ANTHROPIC_API_KEY
    - GOOGLE_API_KEY
    - MOONSHOT_API_KEY
    - MINIMAX_API_KEY
    features:
    - Multi-Provider Support
    - Unified Interface
    - Chat Completions
    - Embeddings
    - Streaming
    - Schema Generation
    - Template Generation
    - Plug & Play
    has_spec: true
    has_readme: true
  auth:
    scope: '@common/auth'
    path: packages/auth
    readme: packages/auth/README.md
    index: packages/auth/src/index.ts
    status: partial
    missing:
    - jsdoc
    - tests
    depends_on:
    - database
    env_vars:
    - JWT_SECRET
    - JWT_ACCESS_TOKEN_TTL
    - JWT_REFRESH_TOKEN_TTL
    - JWT_ISSUER
    - JWT_AUDIENCE
    - MAGIC_LINK_ENABLED
    - MAGIC_LINK_TOKEN_TTL
    - OAUTH_GOOGLE_CLIENT_ID
    - OAUTH_GOOGLE_CLIENT_SECRET
    - OAUTH_GITHUB_CLIENT_ID
    - OAUTH_GITHUB_CLIENT_SECRET
    - ARGON2_TYPE
    - ARGON2_MEMORY_COST
    - ARGON2_TIME_COST
    - ARGON2_PARALLELISM
    - TWO_FACTOR_ISSUER
    - TWO_FACTOR_ALGORITHM
    - TWO_FACTOR_DIGITS
    - TWO_FACTOR_PERIOD
    - TWO_FACTOR_BACKUP_CODES_COUNT
    - TWO_FACTOR_BACKUP_CODES_LENGTH
    - PASSKEYS_RP_ID
    - PASSKEYS_RP_NAME
    - PASSKEYS_RP_ORIGIN
    features:
    - JWT Authentication
    - Magic Links
    - OAuth2
    - 2FA/TOTP
    - Passkeys
    - Argon2
    - Role-based Access Control
    - Refresh Tokens
    has_spec: true
    has_readme: true
  common:
    scope: '@common/common'
    path: packages/common
    readme: packages/common/README.md
    index: packages/common/src/index.ts
    status: partial
    missing:
    - jsdoc
    - tests
    - readme
    depends_on: []
    env_vars: []
    features:
    - BaseAdapter
    - DatabaseExceptionFilter
    - HttpError Hierarchy
    has_spec: false
    has_readme: true
  database:
    scope: '@common/database'
    path: packages/database
    readme: packages/database/README.md
    index: packages/database/src/index.ts
    status: partial
    missing:
    - jsdoc
    - tests
    depends_on:
    - common
    env_vars:
    - MONGODB_URI
    - MONGODB_DB_NAME
    features:
    - Automatic reconnection
    - Transaction support
    - Mongoose integration
    - Configurable options
    has_spec: true
    has_readme: true
  documents:
    scope: '@common/documents'
    path: packages/documents
    readme: packages/documents/README.md
    index: packages/documents/src/index.ts
    status: partial
    missing:
    - jsdoc
    - tests
    depends_on: []
    env_vars: []
    features:
    - Multi-format support
    - Unified interface
    - Extraction metadata
    - Format detection
    has_spec: true
    has_readme: true
  http:
    scope: '@common/http'
    path: packages/http
    readme: packages/http/README.md
    index: packages/http/src/index.ts
    status: partial
    missing:
    - jsdoc
    - tests
    depends_on: []
    env_vars: []
    features:
    - Unified HTTP interface
    - Image download with optimization
    - Automatic error mapping
    - Response normalization
    has_spec: true
    has_readme: true
  playwright:
    scope: '@common/playwright'
    path: packages/playwright
    readme: packages/playwright/README.md
    index: packages/playwright/src/index.ts
    status: partial
    missing:
    - jsdoc
    - tests
    depends_on: []
    env_vars:
    - PLAYWRIGHT_HEADLESS
    - PLAYWRIGHT_TIMEOUT
    - PLAYWRIGHT_RETRIES
    - PLAYWRIGHT_BROWSERS_PATH
    features:
    - Headless Chromium
    - Page management
    - Automatic browser lifecycle
    - Configurable timeouts
    - Chromium path override
    has_spec: true
    has_readme: true
  resend:
    scope: '@common/resend'
    path: packages/resend
    readme: packages/resend/README.md
    index: packages/resend/src/index.ts
    status: partial
    missing:
    - jsdoc
    - tests
    depends_on: []
    env_vars:
    - RESEND_API_KEY
    - RESEND_FROM_EMAIL
    - RESEND_FROM_NAME
    - RESEND_REPLY_TO
    features:
    - ResendService email sending
    - Email templates
    - NewsletterModule
    - Global module
    has_spec: true
    has_readme: true
  serve-static:
    scope: '@common/serve-static'
    path: packages/serve-static
    readme: packages/serve-static/README.md
    index: packages/serve-static/src/index.ts
    status: partial
    missing:
    - jsdoc
    - tests
    depends_on: []
    env_vars: []
    features:
    - EJS template rendering
    - TailwindCSS via CDN
    - Template cache
    - Layout system
    - Path traversal sanitization
    has_spec: true
    has_readme: true
env_vars:
- name: PORT
  group: app
  required: false
  default: '3000'
  description: Application server port
- name: MONGODB_URI
  group: app
  required: true
  default: mongodb://localhost:27017/boilerplate_db
  description: MongoDB connection URI
- name: JWT_SECRET
  group: auth
  required: true
  default: null
  description: Secret key for JWT signing (min 32 chars)
- name: JWT_ACCESS_TOKEN_TTL
  group: auth
  required: false
  default: '900'
  description: Access token TTL in seconds
- name: JWT_REFRESH_TOKEN_TTL
  group: auth
  required: false
  default: '604800'
  description: Refresh token TTL in seconds
- name: JWT_ISSUER
  group: auth
  required: false
  default: api-nominas
  description: JWT issuer claim
- name: JWT_AUDIENCE
  group: auth
  required: false
  default: api-nominas
  description: JWT audience claim
- name: MAGIC_LINK_ENABLED
  group: auth
  required: false
  default: 'true'
  description: Enable magic link authentication
- name: MAGIC_LINK_TOKEN_TTL
  group: auth
  required: false
  default: '300'
  description: Magic link token TTL in seconds
- name: OAUTH_GOOGLE_CLIENT_ID
  group: auth
  required: false
  default: null
  description: Google OAuth client ID
- name: OAUTH_GOOGLE_CLIENT_SECRET
  group: auth
  required: false
  default: null
  description: Google OAuth client secret
- name: OAUTH_GITHUB_CLIENT_ID
  group: auth
  required: false
  default: null
  description: GitHub OAuth client ID
- name: OAUTH_GITHUB_CLIENT_SECRET
  group: auth
  required: false
  default: null
  description: GitHub OAuth client secret
- name: ARGON2_TYPE
  group: auth
  required: false
  default: '2'
  description: Argon2 algorithm type
- name: ARGON2_MEMORY_COST
  group: auth
  required: false
  default: '65536'
  description: Argon2 memory cost in KiB
- name: ARGON2_TIME_COST
  group: auth
  required: false
  default: '3'
  description: Argon2 number of iterations
- name: ARGON2_PARALLELISM
  group: auth
  required: false
  default: '4'
  description: Argon2 parallelism factor
- name: TWO_FACTOR_ISSUER
  group: auth
  required: false
  default: MyApp
  description: TOTP issuer name
- name: TWO_FACTOR_ALGORITHM
  group: auth
  required: false
  default: SHA1
  description: TOTP algorithm
- name: TWO_FACTOR_DIGITS
  group: auth
  required: false
  default: '6'
  description: TOTP code digits
- name: TWO_FACTOR_PERIOD
  group: auth
  required: false
  default: '30'
  description: TOTP period in seconds
- name: TWO_FACTOR_BACKUP_CODES_COUNT
  group: auth
  required: false
  default: '10'
  description: Number of backup codes generated
- name: TWO_FACTOR_BACKUP_CODES_LENGTH
  group: auth
  required: false
  default: '10'
  description: Length of each backup code
- name: PASSKEYS_RP_ID
  group: auth
  required: false
  default: localhost
  description: WebAuthn relying party ID
- name: PASSKEYS_RP_NAME
  group: auth
  required: false
  default: MyApp
  description: WebAuthn relying party name
- name: PASSKEYS_RP_ORIGIN
  group: auth
  required: false
  default: http://localhost:3000
  description: WebAuthn relying party origin
- name: PLAYWRIGHT_HEADLESS
  group: playwright
  required: false
  default: 'true'
  description: Run browser without GUI
- name: PLAYWRIGHT_TIMEOUT
  group: playwright
  required: false
  default: '30000'
  description: Default timeout in milliseconds
- name: PLAYWRIGHT_RETRIES
  group: playwright
  required: false
  default: '3'
  description: Retry count on failure
- name: PLAYWRIGHT_BROWSERS_PATH
  group: playwright
  required: false
  default: null
  description: Custom Chromium path
- name: RESEND_API_KEY
  group: resend
  required: true
  default: null
  description: Resend API key
- name: RESEND_FROM_EMAIL
  group: resend
  required: false
  default: onboarding@resend.dev
  description: Default sender email
- name: RESEND_FROM_NAME
  group: resend
  required: false
  default: My App
  description: Default sender name
- name: RESEND_REPLY_TO
  group: resend
  required: false
  default: null
  description: Global reply-to address
- name: MONGODB_DB_NAME
  group: database
  required: false
  default: null
  description: Database name (fallback from URI)
- name: OPENAI_API_KEY
  group: ai
  required: false
  default: null
  description: OpenAI API key
- name: ANTHROPIC_API_KEY
  group: ai
  required: false
  default: null
  description: Anthropic API key
- name: GOOGLE_API_KEY
  group: ai
  required: false
  default: null
  description: Google Gemini API key
- name: MOONSHOT_API_KEY
  group: ai
  required: false
  default: null
  description: Moonshot API key
- name: MINIMAX_API_KEY
  group: ai
  required: false
  default: null
  description: MiniMax API key
scripts:
  setup: node setup/setup.js
  build: nest build
  format: prettier --write "apps/**/*.ts" "libs/**/*.ts"
  start: nest start
  start:dev: nest start --watch
  start:debug: nest start --debug --watch
  start:prod: /usr/local/bin/entrypoint.sh node dist/apps/nominas/main
  lint: eslint "{src,apps,libs,test}/**/*.ts" --fix
  test: jest
  test:watch: jest --watch
  test:cov: jest --coverage
  test:debug: node --inspect-brk -r tsconfig-paths/register -r ts-node/register node_modules/.bin/jest
    --runInBand
  test:e2e: jest --config ./apps/nominas/test/jest-e2e.json
known_issues:
- id: 1
  description: Auth es stub (demo@example.com)
  severity: alta
  package: auth
  status: open
- id: 2
  description: Swagger tags ausentes en auth controller
  severity: baja
  package: auth
  status: fixed
- id: 3
  description: '@types/bcrypt no se usa'
  severity: baja
  package: root
  status: fixed
- id: 4
  description: auth, resend, serve-static sin path en tsconfig
  severity: baja
  package: root
  status: fixed
- id: 5
  description: http-error duplicado en common y http
  severity: baja
  package: common
  status: fixed
- id: 6
  description: Newsletter usa Map en memoria (no persiste)
  severity: baja
  package: resend
  status: open
sdd:
  enabled: true
  config_file: openspec/config.yaml
  specs_path: openspec/specs
  changes_path: openspec/changes

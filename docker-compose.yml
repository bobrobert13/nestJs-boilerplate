services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: boilerplate-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: boilerplate_db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - boilerplate-network
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: |
        mongosh --quiet --eval "
          try {
            const state = rs.status().myState;
            if (state === 1 || state === 2) quit(0);
            quit(1);
          } catch (e) { quit(1); }
        "
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

  # Boilerplate Service
  boilerplate-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: boilerplate-service
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-admin123}@mongodb:27017/boilerplate_db?authSource=admin&replicaSet=rs0
      # Auth - JWT (MUST be set in production)
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-min-32-chars}
      - JWT_ACCESS_TOKEN_TTL=${JWT_ACCESS_TOKEN_TTL:-900}
      - JWT_REFRESH_TOKEN_TTL=${JWT_REFRESH_TOKEN_TTL:-604800}
      - JWT_ISSUER=${JWT_ISSUER:-api-nominas}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-api-nominas}
      # Auth - Argon2
      - ARGON2_TYPE=${ARGON2_TYPE:-2}
      - ARGON2_MEMORY_COST=${ARGON2_MEMORY_COST:-65536}
      - ARGON2_TIME_COST=${ARGON2_TIME_COST:-3}
      - ARGON2_PARALLELISM=${ARGON2_PARALLELISM:-4}
      # Auth - 2FA
      - TWO_FACTOR_ISSUER=${TWO_FACTOR_ISSUER:-MyApp}
      # Auth - Passkeys
      - PASSKEYS_RP_ID=${PASSKEYS_RP_ID:-localhost}
      - PASSKEYS_RP_NAME=${PASSKEYS_RP_NAME:-MyApp}
      - PASSKEYS_RP_ORIGIN=${PASSKEYS_RP_ORIGIN:-http://localhost:3000}
      # Resend
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-onboarding@resend.dev}
      - RESEND_FROM_NAME=${RESEND_FROM_NAME:-MyApp}
      - RESEND_REPLY_TO=${RESEND_REPLY_TO:-}
      # Playwright
      - PLAYWRIGHT_HEADLESS=true
      - PLAYWRIGHT_TIMEOUT=30000
      - PLAYWRIGHT_RETRIES=3
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - boilerplate-network
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/usuarios"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  boilerplate-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
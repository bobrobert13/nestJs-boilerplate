services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: boilerplate-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: boilerplate_db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - boilerplate-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Boilerplate Service
  boilerplate-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: boilerplate-service
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-admin123}@mongodb:27017/boilerplate_db?authSource=admin
      - PLAYWRIGHT_HEADLESS=true
      - PLAYWRIGHT_TIMEOUT=30000
      - PLAYWRIGHT_RETRIES=3
      - INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY:-your_event_key}
      - INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY:-your_signing_key}
      - INNGEST_BASE_URL=${INNGEST_BASE_URL:-https://inngest.treborjs-dev.online/}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - boilerplate-network
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/usuarios"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  boilerplate-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
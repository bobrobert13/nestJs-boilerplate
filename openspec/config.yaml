schema: spec-driven

context: |
  NestJS 11 monorepo (TypeScript 5.7, Node.js 20+), MongoDB/Mongoose 9.x, Inngest 4.x, Playwright 1.x.
  10 shared packages (ai, auth, common, database, documents, http, inngest, playwright, resend, serve-static)
  under packages/, 1 app (nominas) under apps/ with modules: usuarios, dynamic-schema.
  Swagger at /api, Express platform, class-validator/class-transformer, Argon2 for passwords, 2FA + Passkeys.

strict_tdd: true

testing:
  unit:
    available: true
    runner: jest
    command: "npm run test"
    pattern: "*.spec.ts"
  integration:
    available: true
    runner: jest
    command: "npm run test"
    note: Uses @nestjs/testing with supertest for HTTP integration tests
  e2e:
    available: true
    runner: jest
    command: "npm run test:e2e"
    config: apps/nominas/test/jest-e2e.json
    pattern: "*.e2e-spec.ts"
    note: Uses supertest for HTTP E2E tests against full NestJS app
  coverage:
    available: true
    command: "npm run test:cov"
    output: ./coverage/

quality:
  linter:
    available: true
    tool: eslint
    command: "npm run lint"
    config: eslint.config.mjs
  type_checker:
    available: true
    tool: tsc
    command: "npm run build"
  formatter:
    available: true
    tool: prettier
    command: "npm run format"
    config: .prettierrc (singleQuote, trailingComma 'all')

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns (NestJS module pattern, repository pattern, constructor DI)
    tdd: true
    test_command: "npm run test"
  verify:
    test_command: "npm run test && npm run test:e2e"
    build_command: "npm run build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

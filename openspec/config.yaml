# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: NestJS 11, TypeScript 5.7, MongoDB 7.0 (ReplicaSet), Mongoose 9, Playwright 1.59
  Architecture: Monorepo con packages/@common/*, Repository+Service pattern, Global modules
  Testing: Jest (unit + e2e) — no implementado aún
  Style: ESLint + Prettier, kebab-case files, PascalCase classes, PascalCase+Dtos

strict_tdd: false

rules:
  proposal:
    - Identificar packages/@common afectados
    - Incluir rollback plan para cambios riesgosos
    - Mapear dependencias entre paquetes afectados
  specs:
    - Usar Given/When/Then para escenarios
    - Usar RFC 2119 (MUST, SHALL, SHOULD, MAY)
    - Incluir "Affected docs" en cada spec — rutas a READMEs afectados
  design:
    - Incluir diagramas Mermaid para flujos complejos
    - Documentar decisiones con rationale
    - Referenciar documentación oficial de librerías externas
  tasks:
    - Agrupar por paquete (infra, implementación, documentación)
    - Usar numeración jerárquica (1.1, 1.2)
    - Incluir tarea de documentación en cada cambio
    - Cada tarea completable en sesión única
  apply:
    - Seguir patrones existentes (Repository pattern, Global modules, DTOs)
    - JSDoc obligatorio en nuevos exports públicos
    - Actualizar README.md del paquete afectado SIEMPRE
    - Ejecutar npm run build y npm run lint antes de finalizar
    tdd: false
  verify:
    build_command: "npm run build"
    lint_command: "npm run lint"
  archive:
    - Sincronizar delta specs a main specs de los dominios afectados
    - Verificar que AGENTS.md refleje cambios de estructura

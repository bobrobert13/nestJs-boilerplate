# DocForge — Changelog PR Reminder
#
# When a PR changes source code but NOT CHANGELOG.md,
# post an automated comment reminding the author to update it.
#
# Part of doc-forge auto-maintenance system.

name: Changelog Reminder

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  remind:
    name: Check Changelog Update
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect source changes without changelog update
        id: check
        run: |
          # Get files changed in this PR vs main
          CHANGED=$(git diff --name-only origin/main...HEAD 2>/dev/null || git diff --name-only HEAD~1 2>/dev/null || echo "")

          SRC_CHANGED=0
          CHANGELOG_CHANGED=0

          for file in $CHANGED; do
            case "$file" in
              packages/*/src/*|apps/*/src/*)
                SRC_CHANGED=1
                ;;
              CHANGELOG.md)
                CHANGELOG_CHANGED=1
                ;;
            esac
          done

          echo "src_changed=$SRC_CHANGED" >> $GITHUB_OUTPUT
          echo "changelog_changed=$CHANGELOG_CHANGED" >> $GITHUB_OUTPUT

      - name: Comment reminder on PR
        if: steps.check.outputs.src_changed == '1' && steps.check.outputs.changelog_changed == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const body = ` ## Changelog Update Needed

            This PR changes source code in \`packages/*/src/\` or \`apps/*/src/\` but **CHANGELOG.md** was not modified.

            Please add an entry following the [Keep a Changelog](https://keepachangelog.com/en/1.1.0/) format:

            \`\`\`markdown
            ### Added
            - feat(scope): description

            ### Changed
            - refactor(scope): description

            ### Fixed
            - fix(scope): description
            \`\`\`

            > This reminder is automated by doc-forge. See \`DOCUMENTATION-CONVENTION.md\` for the convention.`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
